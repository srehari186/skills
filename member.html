<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A#100146 — Member Portal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c14;--surface:#0d1420;--surface2:#111927;--border:#1e2d42;
    --accent:#00e5c3;--accent2:#0080ff;--warn:#ff6b35;--gold:#ffc940;
    --text:#e2eaf5;--muted:#5a7a9a;--success:#2ecc71;--danger:#e74c3c;
    --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.4;}

  /* ── LOGIN ── */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;
    background:radial-gradient(ellipse 80% 60% at 50% 40%,#0a1a2e 0%,var(--bg) 70%);}
  .glow{position:absolute;width:500px;height:500px;border-radius:50%;
    background:radial-gradient(circle,rgba(0,229,195,.06) 0%,transparent 70%);
    top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 44px;width:430px;
    position:relative;box-shadow:0 0 60px rgba(0,229,195,.05),0 30px 80px rgba(0,0,0,.6);}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),transparent);border-radius:20px 20px 0 0;}
  .logo{display:flex;flex-direction:column;align-items:center;margin-bottom:32px;}
  .logo .badge{font-family:var(--mono);font-size:11px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
  .logo h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#e2eaf5,var(--accent));-webkit-text-fill-color:transparent;}
  .logo p{font-size:13px;color:var(--muted);margin-top:4px;}
  .member-badge{text-align:center;margin-bottom:24px;font-family:var(--mono);font-size:11px;letter-spacing:2px;
    text-transform:uppercase;color:var(--accent2);padding:8px 16px;
    border:1px solid rgba(0,128,255,.25);border-radius:8px;background:rgba(0,128,255,.06);}
  .fg{margin-bottom:18px;}
  .fg label{display:block;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
  .fg input{width:100%;padding:12px 16px;background:var(--bg);border:1px solid var(--border);border-radius:10px;
    color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:all .2s;}
  .fg input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,195,.1);}
  .pw-wrap{position:relative;}
  .pw-wrap input{padding-right:46px!important;}
  .eye{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;
    cursor:pointer;font-size:15px;color:var(--muted);padding:0;transition:color .15s;}
  .eye:hover{color:var(--accent);}
  .login-btn{width:100%;padding:14px;border:none;border-radius:10px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#080c14;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;}
  .login-btn:hover{opacity:.9;transform:translateY(-1px);}
  .err{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);border-radius:8px;
    padding:10px 14px;font-size:13px;color:#ff8a7a;margin-top:14px;display:none;}
  .hint{margin-top:18px;padding:12px 14px;background:rgba(0,229,195,.05);
    border:1px solid rgba(0,229,195,.1);border-radius:8px;font-size:11px;color:var(--muted);font-family:var(--mono);line-height:1.9;}
  .hint strong{color:var(--accent);}

  /* ── APP ── */
  #app{display:none;min-height:100vh;position:relative;z-index:1;}
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;
    display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .tl{display:flex;align-items:center;gap:14px;}
  .tlogo{font-size:18px;font-weight:800;}
  .tlogo span{color:var(--accent);}
  .chip{font-family:var(--mono);font-size:10px;letter-spacing:2px;padding:3px 10px;border-radius:20px;
    text-transform:uppercase;font-weight:600;background:rgba(0,128,255,.15);color:var(--accent2);border:1px solid rgba(0,128,255,.3);}
  .tr{display:flex;align-items:center;gap:10px;}
  .uname{font-size:13px;color:var(--muted);font-family:var(--mono);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cpw-btn{background:rgba(0,229,195,.08);border:1px solid rgba(0,229,195,.25);color:var(--accent);
    padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .2s;}
  .cpw-btn:hover{background:rgba(0,229,195,.16);}
  .out-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);
    padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--sans);font-weight:600;transition:all .2s;}
  .out-btn:hover{border-color:var(--danger);color:var(--danger);}
  .main{padding:28px 32px;max-width:1400px;margin:0 auto;}

  /* ── STUDENT HEADER ── */
  .shdr{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 32px;
    margin-bottom:28px;display:flex;align-items:center;gap:28px;position:relative;overflow:hidden;}
  .shdr::before{content:'';position:absolute;top:0;right:0;width:300px;height:100%;
    background:linear-gradient(135deg,transparent,rgba(0,229,195,.04));}
  .avatar{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#080c14;flex-shrink:0;}
  .si h2{font-size:22px;font-weight:800;}
  .smeta{display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;}
  .mi{font-size:12px;color:var(--muted);font-family:var(--mono);}
  .mi strong{color:var(--text);}
  .dept-badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
  .dept-ECE{background:rgba(0,229,195,.12);color:var(--accent)}
  .dept-CSE{background:rgba(0,128,255,.12);color:var(--accent2)}
  .dept-AIML{background:rgba(255,201,64,.12);color:var(--gold)}
  .dept-AIDS{background:rgba(255,107,53,.12);color:var(--warn)}
  .dept-IT{background:rgba(46,204,113,.12);color:var(--success)}
  .pts{margin-left:auto;text-align:center;padding:14px 22px;background:rgba(255,201,64,.08);
    border:1px solid rgba(255,201,64,.2);border-radius:12px;flex-shrink:0;}
  .pts .pv{font-size:32px;font-weight:800;color:var(--gold);font-family:var(--mono);}
  .pts .pl{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:4px;}

  /* ── SKILLS ── */
  .sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));gap:20px;}
  .ssec{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:22px;transition:border-color .2s;}
  .ssec:hover{border-color:rgba(0,229,195,.12);}
  .stitle{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;
    display:flex;align-items:center;gap:10px;}
  .stitle::after{content:'';flex:1;height:1px;background:var(--border);}
  .srow{display:flex;align-items:flex-start;padding:8px 0;border-bottom:1px solid rgba(30,45,66,.4);gap:10px;}
  .srow:last-child{border-bottom:none;}
  .slbl{font-size:12px;font-weight:600;color:var(--muted);width:130px;flex-shrink:0;padding-top:8px;}
  .srhs{flex:1;}
  .sdisp{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--accent);padding:6px 10px;
    border-radius:7px;cursor:pointer;min-height:34px;display:flex;align-items:center;
    transition:all .15s;border:1px solid transparent;}
  .sdisp:hover{background:rgba(0,229,195,.06);border-color:rgba(0,229,195,.2);}
  .sdisp.empty{color:var(--muted);font-style:italic;}
  .sdisp .pen{opacity:0;font-style:normal;margin-left:6px;font-size:11px;transition:opacity .15s;}
  .sdisp:hover .pen{opacity:1;}
  .sedit{display:none;}
  .sedit.on{display:block;}
  .sedit input{width:100%;padding:7px 10px;background:var(--bg);border:1px solid var(--accent);
    border-radius:7px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none;
    box-shadow:0 0 0 3px rgba(0,229,195,.1);}
  .eacts{display:flex;gap:6px;margin-top:6px;}
  .bok{padding:4px 14px;background:var(--accent);color:#080c14;border:none;border-radius:5px;
    font-size:11px;font-weight:700;cursor:pointer;font-family:var(--sans);}
  .bcan{padding:4px 10px;background:transparent;color:var(--muted);border:1px solid var(--border);
    border-radius:5px;font-size:11px;cursor:pointer;}
  .tip{margin-top:20px;text-align:center;padding:10px 16px;background:rgba(0,229,195,.04);
    border:1px dashed rgba(0,229,195,.15);border-radius:10px;font-size:12px;color:var(--muted);}
  .tip b{color:var(--accent);}

  /* ── MODAL ── */
  .moverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;
    align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .moverlay.on{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:420px;
    max-width:95vw;padding:36px;position:relative;box-shadow:0 40px 100px rgba(0,0,0,.7);}
  .modal h3{font-size:18px;font-weight:800;margin-bottom:4px;}
  .modal h3 span{color:var(--accent);}
  .modal .sub{font-size:12px;color:var(--muted);margin-bottom:24px;}
  .xbtn{position:absolute;top:20px;right:20px;background:var(--surface2);border:1px solid var(--border);
    color:var(--muted);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;
    display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .xbtn:hover{border-color:var(--danger);color:var(--danger);}
  .mfoot{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}
  .msave{padding:11px 24px;background:var(--accent);color:#080c14;border:none;border-radius:10px;
    font-weight:700;cursor:pointer;font-family:var(--sans);font-size:14px;}
  .mcancel{padding:11px 24px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);
    border-radius:10px;font-weight:600;cursor:pointer;font-family:var(--sans);font-size:14px;}
  .mfg{margin-bottom:16px;}
  .mfg label{display:block;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
  .minput{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:10px;
    color:var(--text);font-family:var(--mono);font-size:13px;outline:none;transition:border-color .2s;}
  .minput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,195,.1);}
  .str-bar{height:4px;border-radius:2px;margin-top:7px;background:var(--border);overflow:hidden;}
  .str-fill{height:100%;border-radius:2px;transition:all .3s;width:0;}
  .merr{background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);border-radius:8px;
    padding:9px 13px;font-size:12px;color:#ff8a7a;margin-top:12px;display:none;}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(100px);
    background:var(--surface);border:1px solid var(--accent);color:var(--accent);
    padding:11px 24px;border-radius:40px;font-size:13px;font-weight:600;z-index:9999;
    transition:transform .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 30px rgba(0,229,195,.2);white-space:nowrap;}
  .toast.on{transform:translateX(-50%) translateY(0);}

  ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  @media(max-width:768px){
    .main{padding:16px}.shdr{flex-direction:column;text-align:center}.pts{margin-left:0}
    .slbl{width:90px;font-size:11px}.card{padding:36px 24px;width:95vw}
    .topbar{padding:0 14px}.uname{display:none}
  }
</style>
</head>

<!-- LOGIN -->
<div id="login-screen">
  <div class="glow"></div>
  <div class="card">
    <div class="logo">
      <div class="badge">✦ Skill Tracker</div>
      <h1>A#100146</h1>
      <p>Student Progress Portal</p>
    </div>
    <div class="member-badge">🎓 Member Login</div>
    <div class="fg">
      <label>Roll Number</label>
      <input id="sr" type="text" placeholder="e.g. 7376251EC104" style="text-transform:uppercase" autocomplete="off"
        onkeydown="if(event.key==='Enter')document.getElementById('sp').focus()">
    </div>
    <div class="fg">
      <label>Password</label>
      <div class="pw-wrap">
        <input id="sp" type="password" placeholder="Enter your password"
          onkeydown="if(event.key==='Enter')doLogin()">
        <button class="eye" type="button" onclick="toggleEye('sp',this)" tabindex="-1">👁</button>
      </div>
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In →</button>
    <div class="err" id="err"></div>
    
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tl">
      <div class="tlogo">A<span>#100146</span></div>
      <span class="chip">MEMBER</span>
    </div>
    <div class="tr">
      <span class="uname" id="uname"></span>
      <button class="cpw-btn" onclick="openCPW()">🔑 Change Password</button>
      <button class="out-btn" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="main">
    <div id="s-hdr" class="shdr"></div>
    <div class="sgrid" id="s-grid"></div>
    <div class="tip">✏️ <b>Click any skill value</b> to update it — changes save automatically.</div>
  </div>
</div>

<!-- CHANGE PASSWORD MODAL -->
<div class="moverlay" id="cpw-modal">
  <div class="modal">
    <button class="xbtn" onclick="closeCPW()">✕</button>
    <h3>Change <span>Password</span></h3>
    <p class="sub">Update your account password below.</p>
    <div class="mfg">
      <label>Current Password</label>
      <div class="pw-wrap">
        <input class="minput" id="pw-cur" type="password" placeholder="Your current password" style="padding-right:46px">
        <button class="eye" type="button" onclick="toggleEye('pw-cur',this)" tabindex="-1">👁</button>
      </div>
    </div>
    <div class="mfg">
      <label>New Password</label>
      <div class="pw-wrap">
        <input class="minput" id="pw-new" type="password" placeholder="Min. 6 characters" style="padding-right:46px"
          oninput="checkStr(this.value)">
        <button class="eye" type="button" onclick="toggleEye('pw-new',this)" tabindex="-1">👁</button>
      </div>
      <div class="str-bar"><div class="str-fill" id="str-fill"></div></div>
    </div>
    <div class="mfg">
      <label>Confirm New Password</label>
      <div class="pw-wrap">
        <input class="minput" id="pw-con" type="password" placeholder="Re-enter new password" style="padding-right:46px">
        <button class="eye" type="button" onclick="toggleEye('pw-con',this)" tabindex="-1">👁</button>
      </div>
    </div>
    <div class="merr" id="cpw-err"></div>
    <div class="mfoot">
      <button class="mcancel" onclick="closeCPW()">Cancel</button>
      <button class="msave" onclick="savePW()">Update Password</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

    {k:'analog',l:'Analog'},{k:'digital',l:'Digital'},{k:'cprog_ece',l:'C Programming'},
    {k:'algebra_ece',l:'Algebra'},{k:'guru_ece',l:'Gurukulam'},{k:'comm_ece',l:'Communication'},
    {k:'logic_ece',l:'Logical Reasoning'},{k:'others_ece',l:'Others'},
  ]},
  {id:'sec_tech',title:'Tech / Software Skills',color:'#0080ff',fields:[
    {k:'cprog',l:'C Programming'},{k:'html',l:'HTML & CSS'},{k:'git',l:'Git'},
    {k:'js',l:'JavaScript'},{k:'linux',l:'Linux'},{k:'net',l:'Networking'},
    {k:'dbms',l:'DBMS'},{k:'ds',l:'Data Structures'},{k:'sysadmin',l:'System Admin'},{k:'react',l:'React'},
  ]},
  {id:'sec_soft',title:'Aptitude / Soft Skills',color:'#ff6b35',fields:[
    {k:'algebra_t',l:'Algebra'},{k:'guru_t',l:'Gurukulam'},{k:'comm_t',l:'Communication'},
    {k:'logic_t',l:'Logical Reasoning'},{k:'others_t',l:'Others'},
  ]},
];

// ── ALWAYS read SECTIONS from localStorage so admin changes are reflected ──
const STORE_SECTIONS = 'a100146_sections';
function loadSections(){
  return JSON.parse(localStorage.getItem(STORE_SECTIONS)||'null') || JSON.parse(JSON.stringify(INIT_SECTIONS));
}
let SECTIONS = loadSections();

let DB = JSON.parse(localStorage.getItem(STORE)||'null') || JSON.parse(JSON.stringify(INIT));
DB.forEach(s=>{if(!s.pw)s.pw='skill@123';});
let me = null;
const persist = ()=>localStorage.setItem(STORE,JSON.stringify(DB));

// ── LISTEN for admin changes in another tab/window ──
window.addEventListener('storage', e => {
  if(e.key === STORE_SECTIONS){
    SECTIONS = loadSections();
    if(me) renderView(); // re-render if a member is logged in
  }
  if(e.key === STORE){
    DB = JSON.parse(localStorage.getItem(STORE)||'null') || JSON.parse(JSON.stringify(INIT));
    if(me) renderView();
  }
});

// toast
let _tt;
function toast(msg,c='var(--accent)'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.borderColor=c;el.style.color=c;
  el.classList.add('on');clearTimeout(_tt);
  _tt=setTimeout(()=>el.classList.remove('on'),2400);
}

// eye toggle
function toggleEye(id,btn){
  const i=document.getElementById(id);
  if(!i)return;
  i.type=i.type==='password'?'text':'password';
  btn.textContent=i.type==='password'?'👁':'🙈';
}

// LOGIN
function doLogin(){
  const err=document.getElementById('err');
  err.style.display='none';
  const roll=document.getElementById('sr').value.trim().toUpperCase();
  const pw=document.getElementById('sp').value;
  if(!roll){err.textContent='Please enter your roll number.';err.style.display='block';return;}
  if(!pw){err.textContent='Please enter your password.';err.style.display='block';return;}
  const rec=DB.find(s=>s.roll.toUpperCase()===roll);
  if(!rec){err.textContent='Roll number not found. Please check and try again.';err.style.display='block';return;}
  if(rec.pw!==pw){err.textContent='Incorrect password. Please try again.';err.style.display='block';return;}
  me={name:rec.name,roll:rec.roll};
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('uname').textContent=me.name;
  renderView();
}

function doLogout(){
  me=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('sr').value='';
  document.getElementById('sp').value='';
  document.getElementById('err').style.display='none';
}

// RENDER VIEW
function renderView(){
  // Always reload from localStorage so admin changes are visible immediately
  SECTIONS = loadSections();
  DB = JSON.parse(localStorage.getItem(STORE)||'null') || JSON.parse(JSON.stringify(INIT));
  const s=DB.find(x=>x.roll.toUpperCase()===me.roll.toUpperCase());
  if(!s)return;
  const ini=s.name.split(' ').map(w=>w[0]).join('').slice(0,2);
  document.getElementById('s-hdr').innerHTML=`
    <div class="avatar">${ini}</div>
    <div class="si">
      <h2>${s.name}</h2>
      <div style="margin-top:6px"><span class="dept-badge dept-${s.dept}">${s.dept}</span></div>
      <div class="smeta">
        <div class="mi">Roll: <strong>${s.roll}</strong></div>
        <div class="mi">Last updated: <strong id="lupd">${s.updated||s.ts||'—'}</strong></div>
      </div>
    </div>
    <div class="pts"><div class="pv">${s.points||'0'}</div><div class="pl">Reward Points</div></div>`;
  document.getElementById('s-grid').innerHTML=SECTIONS.map(sec=>`
    <div class="ssec">
      <div class="stitle" style="color:${sec.color}">${sec.title}</div>
      ${sec.fields.map(f=>{
        const v=(s[f.k]||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        return `<div class="srow">
          <div class="slbl">${f.l}</div>
          <div class="srhs">
            <div class="sdisp ${!v?'empty':''}" id="d-${f.k}" onclick="startEdit('${f.k}',${s.id})">
              ${v||'—'}<span class="pen">✏️</span>
            </div>
            <div class="sedit" id="e-${f.k}">
              <input type="text" id="i-${f.k}" value="${v}" placeholder="Type value, press Enter..."
                onkeydown="onKey(event,'${f.k}',${s.id})">
              <div class="eacts">
                <button class="bok" onclick="confirmEdit('${f.k}',${s.id})">✓ Save</button>
                <button class="bcan" onclick="cancelEdit('${f.k}',${s.id})">✕</button>
              </div>
            </div>
          </div>
        </div>`;}).join('')}
    </div>`).join('');
}

// INLINE EDIT
function startEdit(k,sid){
  document.querySelectorAll('.sedit.on').forEach(el=>cancelEdit(el.id.replace('e-',''),sid));
  document.getElementById('d-'+k).style.display='none';
  document.getElementById('e-'+k).classList.add('on');
  const i=document.getElementById('i-'+k);i.focus();i.select();
}
function cancelEdit(k,sid){
  const s=DB.find(x=>x.id==sid);
  const d=document.getElementById('d-'+k),e=document.getElementById('e-'+k),i=document.getElementById('i-'+k);
  if(!d||!e||!i)return;
  if(s)i.value=s[k]||'';
  d.style.display='';e.classList.remove('on');
}
function confirmEdit(k,sid){
  const i=document.getElementById('i-'+k),d=document.getElementById('d-'+k),e=document.getElementById('e-'+k);
  const v=i.value.trim(),idx=DB.findIndex(x=>x.id==sid);
  if(idx===-1)return;
  DB[idx][k]=v;DB[idx].updated=new Date().toLocaleString('en-GB');
  persist();
  const safe=v.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  d.innerHTML=(safe||'—')+'<span class="pen">✏️</span>';
  d.className='sdisp'+(v?'':' empty');
  d.style.display='';e.classList.remove('on');
  const lu=document.getElementById('lupd');if(lu)lu.textContent=DB[idx].updated;
  let lbl=k;for(const sec of SECTIONS){const f=sec.fields.find(x=>x.k===k);if(f){lbl=f.l;break;}}
  toast(`✓ ${lbl} updated!`);
}
function onKey(e,k,sid){if(e.key==='Enter')confirmEdit(k,sid);if(e.key==='Escape')cancelEdit(k,sid);}

// CHANGE PASSWORD
function openCPW(){
  ['pw-cur','pw-new','pw-con'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('str-fill').style.width='0';
  document.getElementById('cpw-err').style.display='none';
  document.getElementById('cpw-modal').classList.add('on');
}
function closeCPW(){document.getElementById('cpw-modal').classList.remove('on');}
function checkStr(v){
  const f=document.getElementById('str-fill');
  let s=0;
  if(v.length>=6)s++;if(v.length>=10)s++;
  if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^a-zA-Z0-9]/.test(v))s++;
  const c=['#e74c3c','#e05c00','#f39c12','#2ecc71','#00e5c3'];
  const w=['20%','40%','60%','80%','100%'];
  f.style.width=v?(w[s-1]||'10%'):'0';
  f.style.background=v?(c[s-1]||'#e74c3c'):'transparent';
}
function savePW(){
  const errEl=document.getElementById('cpw-err');errEl.style.display='none';
  const cur=document.getElementById('pw-cur').value;
  const nw=document.getElementById('pw-new').value;
  const con=document.getElementById('pw-con').value;
  const idx=DB.findIndex(s=>s.roll.toUpperCase()===me.roll.toUpperCase());
  if(idx===-1)return;
  if(cur!==DB[idx].pw){errEl.textContent='Current password is incorrect.';errEl.style.display='block';return;}
  if(nw.length<6){errEl.textContent='New password must be at least 6 characters.';errEl.style.display='block';return;}
  if(nw!==con){errEl.textContent='New passwords do not match.';errEl.style.display='block';return;}
  DB[idx].pw=nw;persist();closeCPW();
  toast('🔑 Password changed successfully!');
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCPW();});
document.getElementById('cpw-modal').addEventListener('click',e=>{if(e.target===document.getElementById('cpw-modal'))closeCPW();});
</script>
